openapi: 3.1.0
info:
  title: Placetopay Base API
  version: 1.0.0

components:
  schemas:
    Status:
      title: "Status"
      type: "object"
      description: "Structure that contains information about a request or payment, informing its current status."
      properties:
        status:
          type: "string"
          enum:
            - "OK"
            - "FAILED"
            - "APPROVED"
            - "APPROVED_PARTIAL"
            - "PARTIAL_EXPIRED"
            - "REJECTED"
            - "PENDING"
            - "PENDING_VALIDATION"
            - "PENDING_PROCESS"
            - "REFUNDED"
            - "REVERSED"
            - "ERROR"
            - "UNKNOWN"
            - "MANUAL"
            - "DISPUTE"
        reason:
          type: "string"
          minLength: "1"
          maxLength: "4"
        message:
          type: "string"
        date:
          type: "string"
          example: "2021-09-21T09:34:48-05:00"
    Authentication:
      title: "Autenticación"
      type: "object"
      properties:
        login:
          type: "string"
          description: Site identifier
        tranKey:
          type: "string"
          description: Generated **tranKey** credential
        nonce:
          type: "string"
          description: |
            **Random** value for each request encoded in **Base64**.
        seed:
          type: "string"
          description: |
            **Timestamp**, in **ISO 8601** format.
      description: "Structure that contains the site authentication information generated according to the WSSE UsernameToken Profile 1.1"
    KountAccount:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        creationDateTime:
          type: string
          format: date-time
        username:
          type: string
        accountIsActive:
          type: boolean
    KountShipping:
      type: object
      properties:
        type:
          type: string
          description: Type of shipping ("SHIPPED", "DIGITAL", "STORE_PICK_UP", "LOCAL_DELIVERY", "STORE_DRIVE_UP", "IN_PERSON").
        provider:
          type: string
          description: Name of the shipping or delivery provider.
        trackingNumber:
          type: string
          description: Tracking number provided by the carrier.
        shippingMethod:
          type: string
          description: Delivery method ("STANDARD", "EXPRESS", "SAME_DAY", "NEXT_DAY", "SECOND_DAY").
        store:
          type: object
          properties:
            address:
              type: object
              properties:
                street:
                  type: string
                  description: Street address of the store.
                city:
                  type: string
                state:
                  type: string
                postalCode:
                  type: string
                country:
                  type: string
                phone:
                  type: string
                  description: Store contact phone number.
        accessUrl:
          type: string
          format: uri
          description: URL for accessing shipping or download information.
        digitalDownloaded:
          type: boolean
          description: Indicates whether the digital product has been downloaded.
        downloadDeviceIp:
          type: string
          format: ipv4
          description: IP address of the device used for download.
    KountLoyaltyCredit:
      type: object
      properties:
        creditType:
          type: string
        amount:
          type: integer
        currency:
          type: string
          description: Currency code (ISO 4217)
    KountLoyalty:
      type: object
      properties:
        id:
          type: string
        description:
          type: string
        credit:
          $ref: '#/components/schemas/KountLoyaltyCredit'
    KountPromotionsDiscount:
      type: object
      properties:
        percentage:
          type: number
        amount:
          type: integer
        currency:
          type: string
          description: Currency code (ISO 4217)
    KountPromotionsCredit:
      type: object
      properties:
        creditType:
          type: string
        percentage:
          type: number
        currency:
          type: string
          description: Currency code (ISO 4217)
        amount:
          type: integer
    KountPromotions:
      type: object
      properties:
        id:
          type: string
        description:
          type: string
        status:
          type: string
        statusReason:
          type: string
        discount:
          $ref: '#/components/schemas/KountPromotionsDiscount'
        credit:
          $ref: '#/components/schemas/KountPromotionsCredit'
    KountLinks:
      type: object
      properties:
        viewOrderUrl:
          type: string
          format: uri
        requestRefundUrl:
          type: string
          format: uri
        buyAgainUrl:
          type: string
          format: uri
        writeReviewUrl:
          type: string
          format: uri
    KountAdvertisingEvent:
      type: object
      properties:
        type:
          type: string
        value:
          type: string
    KountAdvertising:
      type: object
      properties:
        channel:
          type: string
        affiliate:
          type: string
        subAffiliate:
          type: string
        writeReviewUrl:
          type: string
          format: uri
        events:
          type: array
          items:
            $ref: '#/components/schemas/KountAdvertisingEvent'
        campaign:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
    KountVerification:
      type: object
      properties:
        cvvStatus:
          type: string
          description: Card verification code status.
          enum: [ MATCH, NO_MATCH, UNKNOWN ]
        avsStatus:
          type: string
          description: AVS (Address Verification System) code.
          enum: [ "A","B","C","D","E","F","G","H","I","K","L","M","N","O","P","R","S","T","U","V","W","X","Y","Z" ]
    KountMetadata:
      type: object
      description: Additional information about the transaction that can be used for risk analysis and fraud prevention.
      properties:
        account:
          $ref: '#/components/schemas/KountAccount'
        loyalty:
          $ref: '#/components/schemas/KountLoyalty'
        promotions:
          $ref: '#/components/schemas/KountPromotions'
        links:
          $ref: '#/components/schemas/KountLinks'
        advertising:
          $ref: '#/components/schemas/KountAdvertising'
        shipping:
          $ref: '#/components/schemas/KountShipping'
    KountMetadataToScudo:
      type: object
      description: Additional information about the transaction that can be used for risk analysis and fraud prevention.
      properties:
        receipt:
          type: string
        verification:
          $ref: '#/components/schemas/KountVerification'
        account:
          $ref: '#/components/schemas/KountAccount'
        loyalty:
          $ref: '#/components/schemas/KountLoyalty'
        promotions:
          $ref: '#/components/schemas/KountPromotions'
        links:
          $ref: '#/components/schemas/KountLinks'
        advertising:
          $ref: '#/components/schemas/KountAdvertising'
        shipping:
          $ref: '#/components/schemas/KountShipping'
    Item:
      description: Possesses a collection of element structures.
      title: Item
      type: object
      properties:
        sku:
          type: string
          minLength: 1
          maxLength: 30
          description: |
            Item SKU.   
            e.g.: `SKU-12345`
          example: 'SKU-12345'
        id:
          type: string
          minLength: 1
          maxLength: 30
          description:
          example: 'SKU-12345'
        description:
          type: enum
          description: Description of the article.
          example: Descripción del artículo
        name:
          type: string
          minLength: 1
          maxLength: 120
          description: |
            Article name.   
            e.g.: `Manta de lana`
          example: product_1
        category:
          type: enum
          description: |
            Article category. One of: `digital` `physical`
          enum:
            - digital
            - physical
          example: physical
        qty:
          type: number
          description: |
            Number of articles of this type.   
            e.g.: `23`
          example: '1'
        price:
          type: number
          description: |
            Total cost of the article.   
            e.g.: `1400`
          example: 1400
        tax:
          type: number
          description: |
            Item Tax Amount.   
            e.g.: `100`
        additional:
          type: object
          description: Object that allows sending additional data in JSON format.
          nullable: true
    Amount:
      title: "Amount"
      type: "object"
      description: "Structure that contains the information about the payment of the transaction required to the web service"
      properties:
        currency:
          type: "string"
          description: |
            Alphabetical code of the currency to be used (ISO 4217 alpha code)
          enum:
            - "USD"
            - "COP"
            - "CRC"
            - "EUR"
            - "CAD"
            - "AUD"
            - "GBP"
            - "MXN"
            - "CLP"
          example: "COP"
          minLength: 3
          maxLength: 3
        total:
          description: |
            Total value in the indicated base currency
          example: 2000
          type: "number"
        taxes:
          type: "array"
          description: |
            Structure to define taxes in the payment process.
          items:
            $ref: "#/components/schemas/TaxDetail"
        details:
          description: |
            Structure to define additional details of the amount in the payment process.
          type: "array"
          items:
            $ref: "#/components/schemas/AmountDetail"
      required:
        - "currency"
        - "total"
    TaxDetail:
      title: "TaxDetail"
      type: "object"
      description: "Structure to store information about a tax."
      properties:
        kind:
          type: "string"
          example: "valueAddedTax"
          description: |
            Tax type identifier
          enum:
            - valueAddedTax
            - exciseDuty
            - ice
            - airportTax
            - stateTax
            - reducedStateTax
            - municipalTax
        amount:
          type: "number"
          description: |
            Full amount of tax
        base:
          description: |
            Base amount on which the tax is calculated
          type: "number"
    AmountDetail:
      title: "AmountDetail"
      type: "object"
      description: "Structure to store information about an additional value."
      properties:
        kind:
          type: "string"
          description: |
            Detail Type Identifier.
        amount:
          type: "number"
          description: |
            Total amount of detail
    AmountConversion:
      title: "AmountConversion"
      type: "object"
      description: "Structure to define the conversion factor and values."
      properties:
        from:
          $ref: "#/components/schemas/AmountBase"
        to:
          $ref: "#/components/schemas/AmountBase"
        factor:
          type: "number"
          example: 1
          description: Conversion factor
    AmountBase:
      title: "AmountBase"
      type: "object"
      description: "Structure that represents an amount that defines the currency and the total."
      properties:
        currency:
          type: "string"
          description: |
            Currency according to ISO 4217 (alphabetic code).
        total:
          description: |
            Total value.
          type: "number"
    Transaction:
      description: "Transaction data"
      type: "object"
      x-examples:
        Ejemplo:
          status:
            status: "APPROVED"
            reason: "00"
            message: "approved"
            date: "2021-09-20T20:10:57-05:00"
          date: "2021-09-20T20:10:56-05:00"
          transactionDate: "2021-09-20T20:10:56-05:00"
          internalReference: 2
          reference: "1234567890"
          paymentMethod: "DF_VS"
          franchise: "visa"
          franchiseName: "Visa"
          issuerName: "Testing Bank"
          amount:
            currency: "USD"
            total: 1
          conversion:
            from:
              currency: "USD"
              total: 1
            to:
              currency: "USD"
              total: 1
            factor: 1
          authorization: "000000"
          receipt: "2"
          type: "AUTH_ONLY"
          refunded: "false"
          lastDigits: "0008"
          provider: "DATAFAST"
          discount:
          processorFields:
            id: "de7c331a0f5bebdd1996250296cdaf37"
            b24: "000"
          additional:
            merchantCode: "1000000505"
            terminalNumber: "PY100404"
            credit:
              code: "0"
              type: "00"
              groupCode: "C"
              installments: 0
            totalAmount: 1
            iceAmount: 0
            batch:
            line:
            bin: "411076"
            expiration: "1221"
      title: ""
      properties:
        status:
          $ref: "#/components/schemas/Status"
        date:
          type: "string"
          format: date-time
          description: "Date when the transaction was created (ISO 8601, timezone offset required). Example: `2021-09-20T21:51:59-05:00`."
        transactionDate:
          type: "string"
          format: date-time
          description: "Processing date at provider (may differ from date)."
        internalReference:
          type: "number"
          description: "Platform internal reference."
          minimum: 1
        reference:
          type: "string"
          description: "Merchant order reference."
          minLength: 1
        paymentMethod:
          type: "string"
          description: "Conventional format: processor_franchise (e.g., `ID_VS` for Interdin Visa, `DF_MS` for Datafast Mastercard), exceptions may exist."
          minLength: 5
          maxLength: 5
        franchise:
          type: "string"
          description: "Franchise code."
          enum:
            - "visa"
            - "visa_electron"
            - "amex"
            - "master"
            - "codensa"
            - "diners"
            - "jbc"
            - "discover"
            - "ris"
            - "credencial"
            - "comfama"
            - "colsubsidio"
            - "falabella"
            - "elo"
            - "somos"
            - "tuya"
            - "exito"
            - "alkosto"
            - "maestro"
            - "mefia"
            - "ath_card"
            - "ath"
            - "athmv"
            - "bancolombia"
            - "cooperativa"
            - "debito"
            - "pagoefectivo"
            - "cafam"
            - "efecty"
            - "gana"
            - "masterpass"
            - "ppd"
            - "pse"
            - "safetypay"
            - "supergiros"
            - "visa_checkout"
            - "procesa"
            - "comfandi"
            - "ach"
            - "telered"
            - "aval"
            - "dilo"
            - "banco_bogota"
            - "ebt"
            - "alia"
            - "deuna"
        franchiseName:
          type: "string"
          description: "Franchise display name."
          minLength: 1
        issuerName:
          type: "string"
          description: "Issuing bank name."
          minLength: 1
          nullable: true
        amount:
          $ref: "#/components/schemas/Amount"
        conversion:
          $ref: "#/components/schemas/AmountConversion"
        authorization:
          type: "string"
          description: "Authorization code."
          minLength: 1
          maxLength: 32
          nullable: true
        receipt:
          type: "string"
          description: "Receipt / ticket number."
          maxLength: 16
          minLength: 1
          nullable: true
        type:
          type: "string"
          description: "Transaction operation type."
          minLength: 1
          enum:
            - 'AUTH_ONLY'
            - 'AUTH_CAPTURE'
            - 'CAPTURE_ONLY'
            - 'CREDIT'
            - 'SETTLE'
            - 'VOID'
            - 'CHARGEBACK'
            - 'DISPUTE'
            - 'DISPUTE_LOSS'
            - 'DISPUTE_WIN'
            - 'DISPERSION'
            - 'REFUND'
            - 'PRE_AUTH'
            - 'CHECKIN'
            - 'CHECKOUT'
            - 'RE_AUTH'
            - 'DISPERSION_CAPTURE'
            - 'DISPERSION_SETTLE'
            - 'DISPERSION_CREDIT'
        refunded:
          type: "boolean"
          description: "Refunded flag."
        lastDigits:
          type: "string"
          description: "Masked card, last digits."
          minLength: 2
          nullable: true
        provider:
          type: "string"
          description: "Processor/provider code."
          enum:
            - "CREDIBANCO"
            - "REDEBAN"
            - "INTERDIN"
            - "DATAFAST"
            - "TUYA-DIRECT"
            - "BRASPAG"
            - "TRANSERVER"
            - "SABRE"
            - "EVERTEC"
            - "ACH"
            - "ATH-AVALNET"
            - "SUPERGIROS"
            - "TECNICARD"
            - "MEDIANET"
            - "AUSTRO"
            - "COMFANDI"
            - "PAYSTUDIO"
            - "FLAMINGO"
            - "ATH-MOVIL"
            - "EBUS"
            - "BANCOLOMBIA"
        discount:
          type: "object"
          nullable: true
          description: "Applied discount info."
          properties:
            code:
              type: string
              description: "Discount code."
              maxLength: 32
            type:
              type: string
              description: "Discount type."
              maxLength: 32
            amount:
              type: number
              description: "Discount amount."
              minimum: 0
            base:
              type: number
              description: "Base used."
              minimum: 0
            percentage:
              type: number
              description: "Discount percent."
              minimum: 0
              maximum: 100
        processorFields:
          type: "object"
          description: "Raw processor fields."
          properties:
            id:
              type: "string"
              description: "Processor id."
              maxLength: 64
            b24:
              type: "string"
              description: "Extra field."
        additional:
          type: "object"
          description: |
            See more in [Additional data](/en/gateway/additional-data)
        preAuthorization:
          type: "object"
          description: "Pre-authorization segments."
          items:
            type: "object"
            properties:
              condition:
                type: "string"
                description: "Segment condition."
              internalReference:
                type: "number"
                description: "Segment reference."
              authorization:
                type: "string"
                description: "Segment auth code."
                minLength: 1
                nullable: true
              receipt:
                type: "string"
                description: "Segment receipt."
                minLength: 1
                nullable: true
              amount:
                $ref: "#/components/schemas/Amount"
              salt:
                type: "string"
                description: "Segment salt."
        dispersion:
          type: "array"
          description: "Dispersion splits list."
          items:
            type: "object"
            properties:
              status:
                $ref: "#/components/schemas/Status"
              agreement:
                type: "integer"
                description: "Agreement id."
                nullable: true
              agreementType:
                type: "string"
                description: "Agreement type."
                enum:
                  - "AIRLINE"
                  - "MERCHANT"
              authorization:
                type: "string"
                description: "Leg auth code."
                minLength: 1
                nullable: true
              receipt:
                type: "string"
                description: "Leg receipt."
                minLength: 1
                nullable: true
              amount:
                $ref: "#/components/schemas/Amount"
              refunded:
                type: "boolean"
                description: "Leg refunded flag."
              paymentMethod:
                type: "string"
                description: "Payment method code."
      required:
        - "status"
        - "provider"
        - "internalReference"
        - "reference"
        - "paymentMethod"
        - "franchise"
        - "franchiseName"
        - "amount"
        - "authorization"
        - "receipt"
        - "type"
        - "refunded"
        - "processorFields"
    Dispersion:
      title: "Dispersion"
      type: "object"
      description: "Structure that contains the information required for a dispersion payment."
      properties:
        agreement:
          type: "number"
          description: "Identifier of the transaction recipient. For the main transaction site, the value must be null."
          nullable: true
        agreementType:
          type: "string"
          enum:
            - "AIRLINE"
            - "MERCHANT"
        amount:
          $ref: "#/components/schemas/Amount"

    PaymentModifier:
      title: "PaymentModifier"
      type: "object"
      description: >
        Structure to store information about a payment modifier.

        NOTE: If a modifier that applies a discount is sent, the discounts configured by promotions on the site will not be applied.
      x-examples:
        law-discount:
          type: "FEDERAL_GOVERNMENT"
          code: "17934"
          additional:
            invoice: "123456"
      properties:
        type:
          type: "string"
          enum:
            - "FEDERAL_GOVERNMENT"
          description: "Modifier type"
        code:
          type: "string"
          example: "17934"
          description: "Modifier code. When the type is FEDERAL_GOVERNMENT, it represents the law number for the discount."
        additional:
          type: "object"
          description: "Additional modifier information"
          properties:
            invoice:
              type: "string"
              description: "Invoice number. Required when the type is FEDERAL_GOVERNMENT."
    Payment:
      title: "Payment"
      type: "object"
      description: "Structure that contains information about the transaction payment required by the web service."
      properties:
        reference:
          type: "string"
          minLength: 1
          maxLength: 32
        description:
          type: "string"
          maxLength: 250
        amount:
          $ref: "#/components/schemas/Amount"
        dispersion:
          type: "array"
          items:
            $ref: "#/components/schemas/Dispersion"
        modifiers:
          type: "array"
          description: "Structure that contains payment modifiers."
          items:
            $ref: "#/components/schemas/PaymentModifier"
        shipping:
          $ref: "#/components/schemas/Person"
          description: "Structure to relate shipping information."
        items:
          type: array
          items:
            $ref: '#/components/schemas/Item'
          description: |
            Structure to relate products or items in the process.
    Person:
      title: "Person"
      type: "object"
      description: "Structure that represents the information of a person involved in a transaction."
      properties:
        documentType:
          type: "string"
          description: "[Identification document type](/gateway/document-types)"
          example: "CC"
          maxLength: "6"
        document:
          type: "string"
          description: "Identification document number. It must be a valid number according to the document type. See more at [Identification document types](/gateway/document-types)"
          maxLength: "25"
        name:
          type: "string"
          description: "First name"
          maxLength: "60"
        surname:
          type: "string"
          description: "Last name"
          maxLength: "60"
        company:
          type: "string"
          description: "Company"
          maxLength: "60"
        email:
          type: "string"
          description: "Email address."
          maxLength: "80"
        address:
          $ref: "#/components/schemas/Address"
          description: "Object that contains a person's address information."
        mobile:
          type: "string"
          description: "Mobile phone number"
    Address:
      title: "Address"
      type: "object"
      description: "Structure that contains information about a physical address."
      properties:
        street:
          type: "string"
          maxLength: "128"
          description: "Street"
        city:
          type: "string"
          maxLength: "30"
          description: "City"
        state:
          type: "string"
          maxLength: "3"
          description: "Country subdivision code representing the state or province. ISO 3166-2 format."
          example: "CUN"
        postalCode:
          type: "string"
          maxLength: "10"
          description: "Postal code"
          example: "110111"
        country:
          type: "string"
          maxLength: "2"
          example: "CO"
          description: "Country. ISO 3166-1 alpha-2 code."
        phone:
          type: "string"
          maxLength: "20"
          description: "Phone number"
          example: "3003003000"
    ThreeDS:
      type: "object"
      properties:
        version:
          type: "string"
          enum:
            - "v2"
            - "v2x"
        id:
          type: "number"
          description: "This value only applies if the validation was done with the Placetopay 3DS service"
        enrolled:
          type: "string"
          minLength: 1
          enum:
            - "Y"
            - "N"
            - "U"
          description: "Reports whether the card is registered in 3DS"
        authenticated:
          type: "string"
          minLength: 1
          enum:
            - "Y"
            - "N"
            - "U"
            - "A"
            - "I"
            - "C"
            - "D"
            - "R"
          maxLength: 1
        eci:
          type: "string"
          minLength: 1
          description: "Authentication result indicator generated by e-commerce."
          enum:
            - "02"
            - "01"
            - "00"
            - "05"
            - "06"
            - "07"
        cavv:
          type: "string"
          minLength: 28
          maxLength: 28
          nullable: true
          description: "Authentication value for the franchise generated by the ACS. (3DS field `authenticationValue`)."
          example: "AJkBABIWcQAAAAM5FwIzdGiYeHM"
        xid:
          type: "string"
          minLength: 1
          description: "DS Transaction ID (3DS `dsTransID` field)."
        extra:
          type: "object"
          properties:
            transStatusReason:
              type: string
              description: "Provides information about the status of the transaction."
              nullable: true
            acsTransId:
              type: string
              description: "Unique transaction identifier generated by the ACS."
              example: "37a7b6e0-fd58-4e38-98de-79c70c526a47"
            threeDSServerTransID:
              type: string
              description: "Unique transaction identifier generated by the 3DS Server."
              example: "eadd3a60-b870-41d0-977f-921b3dbe6323/MkGJDl2Y5E="
            deviceChannel:
              type: "string"
              description: "Channel through which the transaction is carried out."
              enum: [ "APP", "BRW", "RI" ]
            messageCategory:
              type: "string"
              description: "Indicates the category of the message."
              enum: [ "PA", "NPA" ]
            authMethod:
              type: "string"
              description: "Indicates whether or not the transaction was challenged."
              example: "FRICTIONLESS_AUTHENTICATION"
            authTimestamp:
              type: "string"
              description: "Specifies the authentication timestamp."
              example: "2020-04-21T01:44:54.000Z"
            authInd:
              type: "string"
              description: "Defines the type of authentication applied depending on the channel used."
              example: "RECURRING_TRANSACTION"
        validSignature:
          type: "boolean"
      required:
        - "enrolled"
        - "authenticated"
        - "eci"
        - "cavv"
        - "xid"
        - "version"
